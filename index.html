<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YANISY</title>
    <style>
        :root {
            --bg-color: #0A0A0A;
            --text-color: #FFFFFF;
            --accent-pink: #FF007F;
            --card-color: #1A1A1A;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Баланс сверху */
        #balance-bar {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        #balance-bar span { color: var(--accent-pink); }
        #balance-bar .balance-left, #balance-bar .balance-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Нижняя панель */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            z-index: 100;
        }
        .nav-item {
            background: none;
            border: none;
            color: #666;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 0 10px;
        }
        .nav-item.active { color: var(--accent-pink); font-weight: bold; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        /* Страницы */
        .page { display: none; padding: 20px; padding-bottom: 20px; }
        .page.active { display: block; }

        /* Форма вывода */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #AAA; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-color);
            color: #fff;
            font-size: 16px;
        }
        .form-group select { appearance: auto; }

        /* Сетка заданий */
        #tasks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .task-item {
            background: var(--card-color);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }
        .task-item .title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .task-item .reward { font-size: 12px; color: #888; margin-bottom: 10px; }
        .task-item button {
            background: var(--accent-pink);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }

        /* Админ-панель */
        #admin-panel {
            display: none;
            background: var(--card-color);
            border: 2px solid var(--accent-pink);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }
        #admin-panel h3 { color: var(--accent-pink); margin-bottom: 10px; }
        .admin-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- БАЛАНС СВЕРХУ -->
    <div id="balance-bar">
        <div class="balance-left">🪙 <span id="user-balance">0</span> Y-Coins</div>
        <div class="balance-right"><span id="stat-balance-top" style="font-weight:normal;">0</span> Y-Coins</div>
    </div>

    <!-- ЗАДАНИЯ (ГЛАВНАЯ) -->
    <div id="page-tasks" class="page active">
        <h4 style="margin-bottom:15px;">🔥 Доступные задания:</h4>
        <div id="tasks-grid"></div>
    </div>

    <!-- СТАТИСТИКА -->
    <div id="page-stats" class="page">
        <h4>📊 Твоя статистика</h4>
        <div style="background:var(--card-color); border-radius:12px; border:1px solid var(--border-color); padding:15px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between;">
                <span>✅ Выполнено:</span>
                <span id="stat-done">0</span>
            </div>
        </div>
        <div style="background:var(--card-color); border-radius:12px; border:1px solid var(--border-color); padding:15px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between;">
                <span>⏳ На проверке:</span>
                <span id="stat-pending">0</span>
            </div>
        </div>
        <div style="background:var(--card-color); border-radius:12px; border:1px solid var(--border-color); padding:15px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between;">
                <span>💰 Баланс:</span>
                <span id="stat-balance" style="color:var(--accent-pink);">0</span>
            </div>
        </div>
    </div>

    <!-- ПОДДЕРЖКА -->
    <div id="page-support" class="page">
        <h4>🆘 Поддержка</h4>
        <div style="background:var(--card-color); border-radius:12px; border:1px solid var(--border-color); padding:15px;">
            <p style="margin-bottom:10px;">Если у тебя возникли вопросы, пиши создателю:</p>
            <button class="main-btn" onclick="window.open('https://t.me/HEDYPA', '_blank')" style="width:100%; padding:12px; background:var(--accent-pink); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">Написать в Telegram</button>
        </div>
    </div>

    <!-- ВЫВОД -->
    <div id="page-withdraw" class="page">
        <h4>💸 Вывод средств</h4>
        <div class="form-group">
            <label>Сколько Y-Coins вывести?</label>
            <input type="number" id="w-amount" placeholder="Например: 150">
        </div>
        <div class="form-group">
            <label>Куда вывести?</label>
            <select id="w-method">
                <option value="">Выберите способ</option>
                <option value="sbp">СБП (по номеру телефона)</option>
                <option value="tinkoff">Тинькофф</option>
                <option value="card">Карта любого банка</option>
            </select>
        </div>
        <div class="form-group">
            <label>Кто тебя привёл? (выбери реферала)</label>
            <select id="w-ref">
                <option value="">— Выберите —</option>
                <option value="ref1">Реферал №1</option>
                <option value="ref2">Реферал №2</option>
                <option value="ref3">Реферал №3</option>
                <option value="ref4">Реферал №4</option>
                <option value="ref5">Реферал №5</option>
                <option value="other">Другой</option>
            </select>
        </div>
        <div class="form-group">
            <label>Твой Telegram (юзернейм)</label>
            <input type="text" id="w-user" placeholder="@username">
        </div>
        <button class="main-btn" onclick="submitWithdraw()" style="width:100%; padding:14px; background:var(--accent-pink); border:none; border-radius:12px; color:#fff; font-weight:bold; cursor:pointer; margin-top:10px;">📤 Подать заявку</button>
    </div>

    <!-- АДМИН-ПАНЕЛЬ -->
    <div id="admin-panel">
        <h3>🔐 Админ-панель</h3>
        <p style="font-size:13px; color:#888;">Только для создателя.</p>
        <div id="admin-list"></div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('page-tasks', this)">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h10v2H4v-2z"/></svg>
            Задания
        </button>
        <button class="nav-item" onclick="switchPage('page-stats', this)">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            Статистика
        </button>
        <button class="nav-item" onclick="switchPage('page-support', this)">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            Поддержка
        </button>
        <button class="nav-item" onclick="switchPage('page-withdraw', this)">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            Вывод
        </button>
    </div>

    <script>
        // ===== ИНТЕГРАЦИЯ GIGAPUB =====
        document.addEventListener('DOMContentLoaded', function() {
            if (!window.loadOfferWallSDK) {
                const script = document.createElement('script');
                script.src = 'https://wall.giga.pub/api/v1/loader.js?projectId=7301';
                script.async = true;
                document.head.appendChild(script);
            }
        });

        // ===== ОТКРЫТИЕ ЗАДАНИЙ =====
        function openOfferWall() {
            if (typeof loadOfferWallSDK === 'function') {
                loadOfferWallSDK({
                    projectId: 7301,
                    onReward: function(data) {
                        let earned = parseInt(data.amount) || 10;
                        balance += earned;
                        done += 1;
                        localStorage.setItem('user_balance', balance);
                        localStorage.setItem('tasks_done', done);
                        updateUI();
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.showAlert('✅ +' + earned + ' Y-Coins!');
                        }
                    }
                });
            } else {
                alert("SDK GigaPub ещё загружается. Подожди 5 секунд и нажми снова!");
            }
        }

        // ===== БАЛАНС И СТАТИСТИКА =====
        let balance = parseInt(localStorage.getItem('user_balance')) || 0;
        let done = parseInt(localStorage.getItem('tasks_done')) || 0;
        let pending = parseInt(localStorage.getItem('tasks_pending')) || 0;

        function updateUI() {
            document.getElementById('user-balance').innerText = balance;
            document.getElementById('stat-balance').innerText = balance;
            document.getElementById('stat-balance-top').innerText = balance;
            document.getElementById('stat-done').innerText = done;
            document.getElementById('stat-pending').innerText = pending;
        }
        updateUI();

        // ===== ГЕНЕРАЦИЯ 50 ЗАДАНИЙ =====
        function generateTasks() {
            const grid = document.getElementById('tasks-grid');
            grid.innerHTML = '';
            const rewards = [5, 10, 15, 20, 25, 30, 50, 100, 150, 200];
            for (let i = 1; i <= 50; i++) {
                let reward = rewards[i % rewards.length];
                let taskHTML = `
                    <div class="task-item">
                        <div class="title">Задание #${i}</div>
                        <div class="reward">+${reward} Y-Coins</div>
                        <button onclick="openOfferWall()">Выполнить</button>
                    </div>
                `;
                grid.innerHTML += taskHTML;
            }
        }
        generateTasks();

        // ===== ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ =====
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        // ===== ЗАЯВКА НА ВЫВОД =====
        let withdrawRequests = JSON.parse(localStorage.getItem('withdraw_requests')) || [];

        function submitWithdraw() {
            let amount = parseInt(document.getElementById('w-amount').value);
            let method = document.getElementById('w-method').value;
            let ref = document.getElementById('w-ref').value;
            let user = document.getElementById('w-user').value.trim();

            if (!amount || amount < 100) return alert('❌ Минимум: 100 Y-Coins');
            if (!method) return alert('❌ Выбери способ вывода');
            if (amount > balance) return alert('❌ Недостаточно Y-Coins');

            let req = { amount, method, ref, user, time: new Date().toLocaleString() };
            withdrawRequests.push(req);
            localStorage.setItem('withdraw_requests', JSON.stringify(withdrawRequests));

            balance -= amount;
            localStorage.setItem('user_balance', balance);
            updateUI();

            alert('✅ Заявка отправлена! Ожидай ответа.');
            document.getElementById('w-amount').value = '';
            document.getElementById('w-user').value = '';
            document.getElementById('w-method').value = '';
            document.getElementById('w-ref').value = '';
            showAdminPanel();
        }

        // ===== АДМИН-ПАНЕЛЬ =====
        function showAdminPanel() {
            let tgUsername = "";
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                const user = window.Telegram.WebApp.initDataUnsafe.user;
                if (user) {
                    tgUsername = user.username || "";
                }
            }

            if (tgUsername.toLowerCase() === "hedypa") {
                document.getElementById('admin-panel').style.display = 'block';
                let list = document.getElementById('admin-list');
                list.innerHTML = '';
                withdrawRequests.forEach((r, i) => {
                    list.innerHTML += `<div class="admin-row">
                        <span>${r.user} | ${r.amount} Y-Coins | ${r.method}</span>
                        <span style="color:#888;">${r.time}</span>
                    </div>`;
                });
            }
        }
        showAdminPanel();
    </script>
</body>
</html>
