<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANISY || freelance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbf7; color: #333; padding: 16px; max-width: 480px; margin: 0 auto; }
        h1 { text-align: center; color: #8a6b5a; margin-bottom: 8px; }
        .nav { display: flex; gap: 4px; margin-bottom: 16px; }
        .nav button {
            flex: 1; background: #e8d5c4; border: none; padding: 8px 12px;
            border-radius: 20px; font-weight: 600; color: #3d2c1e; cursor: pointer;
        }
        .nav button.active { background: #8a6b5a; color: #fff; }
        .page { display: none; }
        .page.active { display: block; }
        .task-card {
            background: #fff; padding: 14px; border-radius: 14px; margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); cursor: pointer;
        }
        .task-card h3 { margin-bottom: 4px; }
        .task-card .price { font-weight: 600; color: #5a8a6a; }
        .profile-card { background: #fff; padding: 16px; border-radius: 14px; }
        .lb-item {
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
        .btn { background: #e8d5c4; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .btn.primary { background: #8a6b5a; color: #fff; }
    </style>
</head>
<body>
    <div id="app">
        <h1>YANISY</h1>
        <div class="nav">
            <button class="active" onclick="showPage('tasks')">📋 Задания</button>
            <button onclick="showPage('profile')">👤 Профиль</button>
            <button onclick="showPage('leaderboard')">🏆 Лидеры</button>
        </div>
        <div id="tasks" class="page active">
            <div id="taskList"></div>
        </div>
        <div id="profile" class="page">
            <div class="profile-card">
                <h2>Мой профиль</h2>
                <p><b>Баланс:</b> <span id="profileBalance">0</span> ₽</p>
                <p><b>Выполнено:</b> <span id="tasksDone">0</span> заданий</p>
                <p><b>Мой промокод:</b> <span id="myPromo">YANISY_123</span></p>
                <button class="btn primary" onclick="addCoins()">+10 коинов (тест)</button>
            </div>
        </div>
        <div id="leaderboard" class="page">
            <div id="lbList"></div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'yanisy_data';
        const tasks = [
            { name: 'Йога', price: 45, link: 'https://singingfiles.com/show.php?l=0&u=2542250&id=74923', desc: 'Скачай игру и открой' },
            { name: 'Walmart', price: 70, link: 'https://singingfiles.com/show.php?l=0&u=2542250&id=75095', desc: 'Введи номер телефона' },
            { name: 'Opera GX', price: 140, link: 'https://singingfiles.com/show.php?l=0&u=2542250&id=75068', desc: 'Установи браузер' }
        ];

        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { balance: 0, tasksDone: 0 };

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function renderTasks() {
            const el = document.getElementById('taskList');
            el.innerHTML = tasks.map(t => `
                <div class="task-card" onclick="window.open('${t.link}', '_blank')">
                    <h3>${t.name}</h3>
                    <p>${t.desc}</p>
                    <span class="price">💰 ${t.price} ₽</span>
                </div>
            `).join('');
        }

        function updateProfile() {
            document.getElementById('profileBalance').textContent = data.balance;
            document.getElementById('tasksDone').textContent = data.tasksDone;
            document.getElementById('myPromo').textContent = 'YANISY_' + Math.floor(Math.random() * 10000);
        }

        function addCoins() {
            data.balance += 10;
            data.tasksDone += 1;
            saveData();
            updateProfile();
        }

        function renderLeaderboard() {
            const el = document.getElementById('lbList');
            el.innerHTML = `<p>🥇 Место 1: Ты — ${data.balance} ₽</p>
                            <p>🥈 Место 2: Аня — 120 ₽</p>
                            <p>🥉 Место 3: Катя — 90 ₽</p>`;
        }

        renderTasks();
        updateProfile();
        renderLeaderboard();
    </script>
</body>
</html>
