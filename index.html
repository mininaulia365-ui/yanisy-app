<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANISY Mini App</title>
    <style>
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #FF007F;
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 15px;
            margin: 10px auto;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: #FFFFFF;
            background-color: #2A2A2A;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-pink {
            background-color: #FF007F;
        }
        .btn:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>YANISY</h1>

    <!-- Эта кнопка запускает задания -->
    <button id="taskBtn" class="btn btn-pink" onclick="openOfferWall()">📋 Открыть задания</button>

    <button class="btn" onclick="alert('Баланс: ' + (localStorage.getItem('user_balance') || 0))">📊 Статистика</button>
    <button class="btn" onclick="window.open('https://t.me/YANISY_bot', '_blank')">🆘 Поддержка</button>
    <button class="btn" onclick="alert('Напиши мне в личку для вывода')">💸 Вывод</button>

    <script>
        // Инициализация Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // ТВОЙ PROJECT_ID ИЗ GIGAPUB
        const PROJECT_ID = "7301"; 

        // Функция открытия стены заданий (исправленная)
        function openOfferWall() {
            if (window.gigaOfferWallSDK) {
                window.gigaOfferWallSDK.open();
            } else {
                // Если SDK ещё не загрузился, грузим сейчас
                console.log("Загружаем SDK GigaPub...");
                window.loadOfferWallSDK({ projectId: PROJECT_ID })
                    .then(sdk => {
                        window.gigaOfferWallSDK = sdk;
                        sdk.open();
                    })
                    .catch(err => {
                        console.error("Ошибка загрузки SDK:", err);
                        alert("Ошибка загрузки заданий. Проверь проект ID.");
                    });
            }
        }

        // Начисление награды (если задание выполнено)
        window.loadGigaSDKCallbacks = window.loadGigaSDKCallbacks || [];
        window.loadGigaSDKCallbacks.push(() => {
            window.loadOfferWallSDK({ projectId: PROJECT_ID })
                .then(sdk => {
                    window.gigaOfferWallSDK = sdk;
                    sdk.on('rewardClaim', async (data) => {
                        let earned = parseInt(data.amount) || 10;
                        let balance = parseInt(localStorage.getItem('user_balance')) || 0;
                        balance += earned;
                        localStorage.setItem('user_balance', balance);
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.showAlert('✅ +' + earned + ' коинов!');
                        }
                        sdk.confirmReward(data.rewardId, data.hash);
                    });
                })
                .catch(err => console.error("Ошибка инициализации GigaPub:", err));
        });
    </script>
</body>
</html>
